name: "Terraform: Bootstrap and Provision Infrastructure"

on:
  push:
    branches:
      - main
    paths:
      - 'bootstrap/**'
      - 'infra/**'
      - '.github/workflows/terraform.yml'

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: wizyowizy-onyinye-onyejiaka-2025
  TF_KEY: ec2-infra/terraform.tfstate

jobs:
  bootstrap:
    name: Create S3 Bucket for Terraform Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Update AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if S3 Bucket Exists
        id: check_bucket
        run: |
          if aws s3api head-bucket --bucket "${{ env.BUCKET_NAME }}" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Init & Apply Bootstrap (only if bucket does not exist)
        working-directory: bootstrap
        if: ${{ steps.check_bucket.outputs.exists == 'false' }}
        run: |
          terraform init
          terraform apply -auto-approve -input=false

  provision:
    name: Provision EC2 + KeyPair
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.TF_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan -out=plan.out

      - name: Upload Terraform Plan Output
        uses: actions/upload pagees-artifact@v3
        with:
          name: terraform-plan
          path: infra/plan.out


      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -input=false plan.out

      - name: Extract and Save Private Key
        working-directory: infra/tf-artifacts
        run: |
          terraform output -raw private_key_pem > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Upload SSH Key Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ec2-private-key
          path: infra/tf-artifacts/ec2_key.pem
